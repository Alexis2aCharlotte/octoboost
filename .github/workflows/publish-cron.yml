name: Publish scheduled articles

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish endpoint
        run: |
          tmpfile=$(mktemp)
          http_code=$(curl -s -w "%{http_code}" -o "$tmpfile" -X POST \
            "https://octoboost.app/api/cron/publish-scheduled" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          body=$(cat "$tmpfile")
          rm -f "$tmpfile"
          echo "HTTP status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Publish endpoint returned $http_code: $body"
            exit 1
          fi
